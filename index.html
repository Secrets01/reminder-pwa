<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PWA Напоминания</title>
    <meta name="theme-color" content="#4CAF50">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-form input, .add-form button {
            padding: 12px;
            font-size: 1rem;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: inherit;
        }

        #reminderText {
            flex: 2;
            min-width: 150px;
        }

        #reminderDateTime {
            flex: 2;
            min-width: 180px;
        }

        #addBtn {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            font-weight: bold;
        }

        #addBtn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        h2 {
            font-size: 1.4rem;
            margin: 20px 0 15px;
            color: #555;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        #reminderList {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .reminder-item {
            background: #f9f9f9;
            border-radius: 16px;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            border-left: 5px solid #4CAF50;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .reminder-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .reminder-item .info {
            flex: 1;
        }

        .reminder-text {
            font-weight: 500;
            font-size: 1.1rem;
            color: #333;
        }

        .reminder-datetime {
            font-size: 0.8rem;
            color: #888;
            margin-top: 4px;
        }

        .delete-btn {
            background: #ff5252;
            color: white;
            border: none;
            border-radius: 30px;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: #e03131;
            transform: scale(1.1);
        }

        .empty-state {
            text-align: center;
            color: #aaa;
            padding: 40px 20px;
            font-size: 0.95rem;
        }

        .stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: center;
            color: #888;
            font-size: 0.85rem;
        }

        @media (max-width: 500px) {
            .container {
                padding: 15px;
            }
            
            .add-form input, .add-form button {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            <span>📝</span>
            Напоминания PWA
        </h1>
        
        <div class="add-form">
            <input type="text" id="reminderText" placeholder="Что нужно сделать?" required>
            <input type="datetime-local" id="reminderDateTime">
            <button id="addBtn">➕ Добавить</button>
        </div>

        <h2>📋 Список напоминаний</h2>
        <ul id="reminderList"></ul>
        
        <div class="stats" id="stats">
            Загрузка...
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('✅ SW registered:', reg))
                .catch(err => console.log('❌ SW error:', err));
        }
    </script>
</body>
</html>
